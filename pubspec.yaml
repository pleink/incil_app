name: incil_camp_app
description: "Incil CampApp"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0

  # State / DI / Routing
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  rxdart: ^0.28.0
  get_it: ^9.1.0
  go_router: ^17.0.0

  # Platform integrations
  webview_flutter: ^4.10.0
  onesignal_flutter: ^5.0.0
  shared_preferences: ^2.5.3
  package_info_plus: ^8.3.1
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  flutter_svg: ^2.0.10

  intl: any
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.4.15
  go_router_builder: ^3.0.1

  bloc_test: ^10.0.0
  webview_flutter_platform_interface: ^2.15.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/logo/
    - assets/splash/

  fonts:
    - family: NeueRegrade
      fonts:
        - asset: assets/fonts/NeueRegradeVariable.ttf
